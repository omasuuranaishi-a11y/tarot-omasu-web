<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>宵の占い処 ─ 三枚引きタロット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9a35a; --gold-hi:#ead088; --gold-dim:rgba(201,163,90,.45);
    --ink:#ece6d8; --ink-dim:rgba(236,230,216,.62);
    --lavender:#b3a0e0;
    --sheet-bg:#0f0a24;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(ellipse 120% 60% at 50% 115%, #241247 0%, transparent 62%),
      linear-gradient(to bottom, #04030f 0%, #0b0726 55%, #170d38 100%);
    color:var(--ink);
    font-family:'Noto Serif JP', serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button,input{font-family:inherit;}

  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .star{position:absolute;border-radius:50%;background:#fff;
    animation:tw var(--tw,4s) ease-in-out var(--td,0s) infinite;}
  @keyframes tw{0%,100%{opacity:var(--o1,.1);}50%{opacity:var(--o2,.7);}}

  #gl{position:fixed;inset:0;z-index:1;display:block;}

  .house{
    position:fixed;top:calc(10px + env(safe-area-inset-top));left:14px;
    z-index:6;pointer-events:none;
    font-family:'Cormorant Garamond',serif;
    font-size:10px;letter-spacing:.4em;color:var(--gold-dim);
  }

  /* 進行キャプション */
  #ribbon{
    position:fixed;top:calc(26px + env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);z-index:6;
    max-width:92vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:8px 22px;border-radius:999px;
    border:1px solid var(--gold-dim);
    background:rgba(8,6,24,.62);
    font-size:12px;letter-spacing:.14em;color:var(--ink);
    opacity:0;transition:opacity .7s ease;pointer-events:none;
  }
  #ribbon.show{opacity:1;}

  /* ── 質問パネル ── */
  #ask{
    position:fixed;inset:0;z-index:20;
    display:flex;align-items:center;justify-content:center;padding:22px;
    background:rgba(3,2,12,.45);
    transition:opacity .9s ease;
  }
  #ask.hide{opacity:0;pointer-events:none;}
  .ask-box{
    width:min(440px,100%);
    border:1px solid var(--gold-dim);border-radius:14px;
    background:rgba(10,7,28,.82);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    padding:30px 26px 28px;text-align:center;
    box-shadow:0 18px 60px rgba(0,0,0,.5);
  }
  .ask-box .en{
    font-family:'Cormorant Garamond',serif;font-size:10px;
    letter-spacing:.42em;text-indent:.42em;color:var(--gold);
    text-transform:uppercase;
  }
  .ask-box h1{
    margin:10px 0 20px;font-size:16.5px;font-weight:500;
    letter-spacing:.18em;text-indent:.09em;
  }
  #q{
    width:100%;padding:12px 15px;
    border:1px solid var(--gold-dim);border-radius:8px;
    background:rgba(255,255,255,.04);
    color:var(--ink);font-size:13px;letter-spacing:.04em;
    outline:none;text-align:center;
  }
  #q::placeholder{color:rgba(236,230,216,.32);}
  #q:focus{border-color:var(--gold);}
  .ask-note{margin-top:9px;font-size:10.5px;color:var(--ink-dim);letter-spacing:.08em;}
  #askBtn{
    margin-top:20px;padding:12px 42px;border-radius:999px;
    border:1px solid var(--gold);background:rgba(201,163,90,.12);
    color:var(--gold-hi);font-size:12.5px;letter-spacing:.26em;text-indent:.26em;
    cursor:pointer;transition:background .3s;
    animation:breathe 3.4s ease-in-out infinite;
  }
  #askBtn:active{background:rgba(201,163,90,.25);}
  @keyframes breathe{0%,100%{opacity:.72;}50%{opacity:1;}}

  /* 開いた3枚のラベル */
  .lbl{
    position:fixed;z-index:5;transform:translate(-50%,0);
    text-align:center;opacity:0;transition:opacity .8s ease;
    pointer-events:none;white-space:nowrap;
  }
  .lbl.show{opacity:1;}
  .lbl .p{font-size:10.5px;letter-spacing:.3em;text-indent:.3em;color:var(--lavender);}
  .lbl .n{margin-top:3px;font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--gold-hi);}
  .lbl .o{margin-top:2px;font-size:10px;letter-spacing:.2em;text-indent:.1em;color:var(--ink-dim);}

  /* ── 鑑定シート ── */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    max-height:72dvh;
    background:var(--sheet-bg);
    border-top:1px solid rgba(201,163,90,.4);
    border-radius:18px 18px 0 0;
    box-shadow:0 -14px 50px rgba(0,0,0,.6);
    transform:translateY(103%);
    transition:transform .85s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column;
  }
  #sheet.show{transform:translateY(0);}
  .sheet-handle{flex:none;padding:12px 0 8px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .sheet-handle::before{content:"";display:inline-block;width:42px;height:4px;border-radius:2px;background:rgba(201,163,90,.45);}
  .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 20px calc(34px + env(safe-area-inset-bottom));}
  .sheet-inner{max-width:620px;margin:0 auto;}
  .q-echo{
    text-align:center;margin:8px 0 20px;
    font-size:13px;line-height:2;letter-spacing:.03em;
    padding:12px 14px;border:1px solid rgba(179,160,224,.3);border-radius:10px;
    background:rgba(179,160,224,.05);
  }
  .q-echo b{color:var(--gold-hi);font-weight:600;}
  .reading{
    border:1px solid rgba(201,163,90,.28);border-radius:12px;
    background:rgba(255,255,255,.024);
    padding:18px 16px 20px;margin-bottom:16px;
  }
  .r-pos{display:flex;align-items:baseline;gap:10px;padding-bottom:9px;margin-bottom:12px;
    border-bottom:1px dashed rgba(201,163,90,.3);}
  .r-pos .jp{font-size:12px;letter-spacing:.24em;color:var(--lavender);}
  .r-pos .en{font-family:'Cormorant Garamond',serif;font-size:9.5px;letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;}
  .r-name{font-size:16px;font-weight:600;letter-spacing:.06em;color:var(--gold-hi);margin-bottom:5px;}
  .r-orient{display:inline-block;font-size:10.5px;letter-spacing:.18em;text-indent:.09em;
    border:1px solid var(--gold-dim);border-radius:4px;padding:2px 9px;color:var(--gold);margin-bottom:13px;}
  .r-block{margin-bottom:12px;}
  .r-block:last-child{margin-bottom:0;}
  .r-label{font-size:11px;letter-spacing:.2em;color:var(--lavender);margin-bottom:4px;}
  .r-text{font-size:13px;line-height:2;letter-spacing:.02em;color:var(--ink);}
  .r-text.logic{font-size:12.5px;color:var(--ink-dim);border-left:2px solid rgba(179,160,224,.4);padding-left:10px;}
  .synth{
    border:1px solid rgba(179,160,224,.35);border-radius:12px;
    background:linear-gradient(170deg, rgba(179,160,224,.06), rgba(255,255,255,.015));
    padding:18px 16px 20px;margin:22px 0 6px;
  }
  .synth-title{text-align:center;margin-bottom:14px;}
  .synth-title .en{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.4em;text-indent:.4em;color:var(--lavender);}
  .synth-title .jp{display:block;margin-top:5px;font-size:14px;font-weight:600;letter-spacing:.2em;text-indent:.2em;}
  .synth .fact{display:flex;gap:10px;align-items:baseline;font-size:12.5px;line-height:1.9;color:var(--ink);margin-bottom:8px;}
  .synth .fact .tag{flex:none;font-size:10px;letter-spacing:.14em;color:var(--gold);
    border:1px solid var(--gold-dim);border-radius:3px;padding:1px 7px;transform:translateY(-1px);}
  .synth .story{margin-top:14px;padding-top:13px;border-top:1px dashed rgba(179,160,224,.3);
    font-size:13px;line-height:2.05;color:var(--ink);}
  .actions{display:flex;flex-direction:column;gap:11px;margin-top:24px;align-items:center;}
  .actions button{width:min(100%,320px);padding:13px 0;border-radius:999px;
    font-size:12.5px;letter-spacing:.24em;text-indent:.24em;cursor:pointer;transition:opacity .3s, background .3s;}
  #copyBtn{background:linear-gradient(135deg, #b28a45, #d9b268);border:none;color:#160f2e;font-weight:600;}
  #copyBtn:active{opacity:.85;}
  #againBtn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold-hi);}
  #againBtn:active{background:rgba(201,163,90,.12);}
  #copyDone{font-size:11px;letter-spacing:.12em;color:var(--lavender);opacity:0;transition:opacity .5s;min-height:1.2em;}
  #copyDone.show{opacity:1;}
  .sheet-foot{text-align:center;margin-top:26px;font-family:'Cormorant Garamond',serif;
    font-size:9.5px;letter-spacing:.4em;text-indent:.4em;color:rgba(236,230,216,.28);}

  #reopen{
    position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));
    transform:translateX(-50%);z-index:25;
    background:rgba(15,10,36,.85);border:1px solid var(--gold-dim);
    border-radius:999px;padding:10px 30px;
    color:var(--gold-hi);font-size:12px;letter-spacing:.26em;text-indent:.26em;
    cursor:pointer;opacity:0;pointer-events:none;transition:opacity .5s;
  }
  #reopen.show{opacity:1;pointer-events:auto;}

  #nogl{
    position:fixed;inset:0;z-index:40;display:none;
    align-items:center;justify-content:center;padding:30px;text-align:center;
    font-size:13px;line-height:2.2;color:var(--ink-dim);
    background:rgba(4,3,14,.9);
  }
</style>
</head>
<body>

<div id="stars"></div>
<canvas id="gl"></canvas>
<div class="house">YOI NO URANAIDOKORO · 78</div>
<div id="ribbon"></div>

<div id="ask">
  <div class="ask-box">
    <div class="en">Three Card Tarot</div>
    <h1>「今宵は、何を占いましょう」</h1>
    <input id="q" type="text" maxlength="60" placeholder="例：いまの仕事を、このまま続けるべき？">
    <div class="ask-note">問いを胸に浮かべるだけでも、かまいません</div>
    <button id="askBtn">カードに委ねる</button>
  </div>
</div>

<div class="lbl" id="lbl0"><div class="p">過去</div><div class="n"></div><div class="o"></div></div>
<div class="lbl" id="lbl1"><div class="p">現在</div><div class="n"></div><div class="o"></div></div>
<div class="lbl" id="lbl2"><div class="p">未来</div><div class="n"></div><div class="o"></div></div>

<button id="reopen">結果を見る</button>

<div id="sheet" role="dialog" aria-label="鑑定結果">
  <div class="sheet-handle" id="sheetHandle"></div>
  <div class="sheet-body">
    <div class="sheet-inner">
      <div class="q-echo" id="qEcho"></div>
      <div id="readings"></div>
      <div id="synthesis"></div>
      <div class="actions">
        <button id="copyBtn">テキストをコピー</button>
        <div id="copyDone"></div>
        <button id="againBtn">もう一度、占う</button>
      </div>
      <div class="sheet-foot">YOI NO URANAIDOKORO</div>
    </div>
  </div>
</div>

<div id="nogl">この端末では3D表示を利用できないようです。<br>お手数ですが、別のブラウザや端末でお試しください。</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const MAJORS = [
{no:"0",name:"愚者",en:"The Fool",symbol:"❂",kw:"出発",
 up:{core:"まだ形になっていないものに、足が向いています。計画の完成度より、動き出したという事実のほうが意味を持つときです。",
     guide:"準備が六割でも、最初の一歩は踏み出せます。細部は歩きながら整えるつもりで、身軽さを保ってください。",
     aff:"私は、身軽なまま新しい道を歩きはじめます。"},
 rev:{core:"動きたい気持ちと、足元への不安が同居しています。無計画さが、自由ではなく迷いとして出やすいときです。",
     guide:"いったん立ち止まり、持っている荷物の中身を確認するタイミングです。捨てるものを一つ決めるだけで、次の一歩は軽くなります。",
     aff:"私は、立ち止まる時間にも意味があると知っています。"}},
{no:"I",name:"魔術師",en:"The Magician",symbol:"✦",kw:"創造",
 up:{core:"必要な道具は、すでに手元にそろっています。足りないのは材料ではなく、使いはじめる合図だけです。",
     guide:"頭の中の構想を、今日ひとつだけ目に見える形にしてください。企画の一行でも、最初の連絡でもかまいません。",
     aff:"私は、いま持っているもので始められます。"},
 rev:{core:"力はあるのに、出しどころが定まっていません。器用さが、あちこちに散る形で使われている気配があります。",
     guide:"やることを絞る勇気が要る時期です。一番手応えのあるものを一つ選び、他はいったん保留にしてください。",
     aff:"私は、自分の力の注ぎ先を自分で選びます。"}},
{no:"II",name:"女教皇",en:"The High Priestess",symbol:"☽",kw:"直感",
 up:{core:"答えは外ではなく、すでに自分の内側にあります。騒がしい情報から離れるほど、輪郭がはっきりしてきます。",
     guide:"即断しないことが、いまは正解です。ひと晩置く、一人の時間を作る、そのあいだに直感が整理をしてくれます。",
     aff:"私は、静けさの中の声を聞き分けられます。"},
 rev:{core:"感じてはいるのに、見ないふりをしていることがありそうです。あるいは、勘に頼りすぎて確認を飛ばしている可能性もあります。",
     guide:"直感と思い込みを仕分けてください。紙に書き出して、根拠のあるものと気分だけのものを分けると、視界が晴れます。",
     aff:"私は、感じたことを正直に見つめます。"}},
{no:"III",name:"女帝",en:"The Empress",symbol:"❀",kw:"実り",
 up:{core:"育ててきたものが、実りに向かっています。奪い合わなくても満ちてくる、そういう循環の中にいます。",
     guide:"効率より、心地よさを基準にしてください。休息も食事も環境も、自分を丁寧に扱うことがそのまま成果につながる時期です。",
     aff:"私は、受け取ることを自分に許します。"},
 rev:{core:"与えすぎか、受け取らなすぎか、どちらかに傾いています。世話を焼くことで、自分を後回しにしていないでしょうか。",
     guide:"まず自分の器を満たすことから始めてください。順番が変わるだけで、同じ行動でも消耗が癒しに変わります。",
     aff:"私は、自分を満たすことに罪悪感を持ちません。"}},
{no:"IV",name:"皇帝",en:"The Emperor",symbol:"♦",kw:"構築",
 up:{core:"感覚ではなく、構造で物事を支える局面です。ルールや計画といった骨組みが、あなたの味方になります。",
     guide:"決める役割から逃げないでください。境界線と期限を自分で引くと、周囲の景色まで整理されていきます。",
     aff:"私は、自分の領域を自分で治めます。"},
 rev:{core:"支配とコントロールの匙加減が崩れています。固くなりすぎているか、誰かの固さに窮屈さを感じているかもしれません。",
     guide:"正しさで押し切る前に、そのルールが今も機能しているかを確認してください。骨組みは、作り直してよいものです。",
     aff:"私は、強さと柔らかさを両方使えます。"}},
{no:"V",name:"法王",en:"The Hierophant",symbol:"⚭",kw:"学び",
 up:{core:"我流よりも、すでにある知恵が効く場面です。先人のやり方や正攻法の中に、いま必要なヒントがあります。",
     guide:"信頼できる人に教わる、基本に立ち返る、その素直さが近道になります。相談する相手は、実績で選んでください。",
     aff:"私は、学ぶ姿勢を持ち続けます。"},
 rev:{core:"常識やしきたりが、支えではなく縛りになりかけています。「こうあるべき」の出どころを疑ってよいときです。",
     guide:"型を破る前に、どの型に従ってきたのかを言葉にしてください。手放すルールを選べれば、残したルールは力になります。",
     aff:"私は、自分に合う教えを自分で選びます。"}},
{no:"VI",name:"恋人",en:"The Lovers",symbol:"❦",kw:"選択",
 up:{core:"心が惹かれる方向と、進むべき方向が一致しつつあります。損得を超えて「好き」が判断材料になってよいときです。",
     guide:"迷ったら、心が軽くなるほうを選んでください。この時期の直感的な選択には、あとから理屈がついてきます。",
     aff:"私は、心が動くほうを信じて選びます。"},
 rev:{core:"決めきれない状態が続いています。どちらも選ばないことで、一番望まないはずの現状維持を選び続けているかもしれません。",
     guide:"選択肢を眺める時間は、もう十分です。期限を切って、選ばなかったほうをきちんと手放す準備をしてください。",
     aff:"私は、選ぶことで前に進みます。"}},
{no:"VII",name:"戦車",en:"The Chariot",symbol:"➤",kw:"前進",
 up:{core:"迷いより勢いが勝っている、追い風の局面です。多少の障害なら、いまの推進力で乗り越えられます。",
     guide:"考えすぎる前に着手してください。ただしハンドルは握ったまま。速度と方向の両方を自分で持つのが条件です。",
     aff:"私は、自分の意志で進路を決めて進みます。"},
 rev:{core:"アクセルとブレーキを同時に踏んでいるような状態です。焦りだけが空転して、消耗が先に来ています。",
     guide:"速度を落とすことは、負けではありません。行き先の確認さえ済めば、同じ力がまっすぐ前進に変わります。",
     aff:"私は、進む力と止まる力を両方持っています。"}},
{no:"VIII",name:"力",en:"Strength",symbol:"∞",kw:"調律",
 up:{core:"力ずくではなく、なだめて味方につける強さが働いています。焦りや衝動と、うまく共存できているときです。",
     guide:"感情を抑え込むのではなく、手なずけるイメージで。時間をかけて信頼を積む姿勢が、一番の近道になります。",
     aff:"私は、穏やかさの中に強さを持っています。"},
 rev:{core:"自信が揺らぐか、逆に力みすぎるか、振れ幅が大きくなっています。抑えようとするほど、暴れる何かがありそうです。",
     guide:"今日は勝とうとしないでください。整えるだけの日を一日はさむと、握る力が戻ってきます。",
     aff:"私は、弱さを認められる強さがあります。"}},
{no:"IX",name:"隠者",en:"The Hermit",symbol:"🏮",kw:"内省",
 up:{core:"外の評価から離れて、自分の内側を照らす時期に入っています。一人の時間が、いちばん濃い学びになります。",
     guide:"答えを人に求めず、自分の記録を読み返してください。過去の自分が残したものの中に、灯りになる一行があります。",
     aff:"私は、一人の時間を恐れません。"},
 rev:{core:"内省が孤立に、慎重さが停滞に変わりかけています。籠もることが目的になっていないか、確認したいところです。",
     guide:"完全に閉じる前に、一つだけ窓口を残してください。深く潜るためにこそ、戻る場所の確保が必要です。",
     aff:"私は、閉じる時期と開く時期を選べます。"}},
{no:"X",name:"運命の輪",en:"Wheel of Fortune",symbol:"☸",kw:"転機",
 up:{core:"自分の努力とは別の次元で、状況が動きはじめています。巡ってきた流れに乗ること自体が、いまの実力です。",
     guide:"チャンスは、検討している間に回転していきます。多少不格好でも、来た波には手を挙げて乗ってください。",
     aff:"私は、巡ってきた流れを受け取ります。"},
 rev:{core:"思い通りに進まないのは、力不足ではなくタイミングの問題です。歯車が噛み合うまでの、待ち時間にいます。",
     guide:"いま無理にこじ開けないでください。次の回転までに準備を整えた人だけが、好転を好機にできます。",
     aff:"私は、待つ時間を準備の時間に変えます。"}},
{no:"XI",name:"正義",en:"Justice",symbol:"⚖",kw:"均衡",
 up:{core:"筋を通すことが、最終的に一番の得になる局面です。感情ではなく事実で判断する冷静さが働いています。",
     guide:"曖昧にしてきた約束や条件を、この機会に文字にしてください。フェアであることが、あなたの立場を強くします。",

/* ================================================================
   デッキと鑑定エンジン（78枚）
================================================================ */
const DECK = [];
MAJORS.forEach(m => DECK.push({type:"major", m}));
for(const key of ["wand","cup","sword","pent"]){
  RANKS.forEach((r, i) => DECK.push({type:"minor", suit:key, rank:r, core:MINOR_CORE[key][i]}));
}
const POSITIONS = [
  {key:"past", jp:"過去", en:"Past"},
  {key:"present", jp:"現在", en:"Present"},
  {key:"future", jp:"未来", en:"Future"},
];
function cardName(c){ return c.type==="major" ? `${c.m.no}　${c.m.name}` : `${SUITS[c.suit].jp}の${c.rank.jp}`; }
function cardKw(c){ return c.type==="major" ? c.m.kw : c.rank.kw; }

function buildReading(c, orient, posIdx){
  const pos = POSITIONS[posIdx];
  const isUp = orient === "up";
  const tie = POS_TIE[pos.key][orient];
  if(c.type === "major"){
    const side = isUp ? c.m.up : c.m.rev;
    const logic = `大アルカナは、日常の工夫を超えた大きな流れを示す層のカードです。このカードのテーマは「${c.m.kw}」。${isUp ? "その力が本来の形で表に出ています。" : "その力が滞るか、裏返しの形で出ています。"}${tie}`;
    return {core:side.core, logic, guide:side.guide, aff:side.aff};
  }
  const s = SUITS[c.suit];
  const core = isUp ? c.core.up : c.core.rev;
  const logic = `${s.jp}（${s.element}のエレメント）＝${s.domain}の領域 × ${c.rank.jp}＝${c.rank.stage}。${isUp ? "この働きが、素直な形で流れています。" : "逆位置なので、この働きが滞るか、過剰になる形で出ています。"}${tie}`;
  const guide = isUp
    ? `${c.rank.act}${s.up2}`
    : `${s.rev2}流れが戻ってきたら、次の一手はこれです。${c.rank.act}`;
  const affPool = isUp ? s.affUp : s.affRev;
  const aff = affPool[c.rank.v % affPool.length];
  return {core, logic, guide, aff};
}

function buildSynthesis(drawn){
  const facts = [];
  const majors = drawn.map((d,i)=>({d,i})).filter(x=>x.d.card.type==="major");
  if(majors.length === 0){
    facts.push({tag:"構成", text:"大アルカナなし。日々の選択と工夫で十分に動かせる範囲のテーマです。"});
  }else if(majors.length === 1){
    const m = majors[0];
    facts.push({tag:"構成", text:`大アルカナが1枚（${POSITIONS[m.i].jp}の「${m.d.card.m.name}」）。今回の読みの軸はここにあります。`});
  }else if(majors.length === 2){
    facts.push({tag:"構成", text:"大アルカナが2枚。個人の努力の範囲を超えた、大きな流れが強く関わっています。"});
  }else{
    facts.push({tag:"構成", text:"3枚すべて大アルカナ。人生の章が切り替わるレベルのテーマが動いています。"});
  }
  const suitCount = {};
  drawn.forEach(d=>{ if(d.card.type==="minor") suitCount[d.card.suit]=(suitCount[d.card.suit]||0)+1; });
  const dominant = Object.entries(suitCount).find(([,n])=>n>=2);
  if(dominant){
    const s = SUITS[dominant[0]];
    facts.push({tag:"領域", text:`${s.element}のエレメント（${s.jp}＝${s.short}）が${dominant[1]}枚。今回の相談の重心は「${s.domain}」にあります。`});
  }else if(Object.keys(suitCount).length === 3){
    facts.push({tag:"領域", text:"エレメントが三種に分散。複数の領域が同時に動いている時期です。"});
  }else if(Object.keys(suitCount).length === 2){
    const names = Object.keys(suitCount).map(k=>`${SUITS[k].element}（${SUITS[k].domain}）`).join("と");
    facts.push({tag:"領域", text:`エレメントは${names}。この二つの領域のあいだで、テーマが行き来しています。`});
  }
  const revs = drawn.map((d,i)=>({d,i})).filter(x=>x.d.orient==="rev");
  if(revs.length === 1){
    facts.push({tag:"正逆", text:`逆位置は1枚だけ（${POSITIONS[revs[0].i].jp}）。流れの引っかかりは、この一点に集中しています。`});
  }else if(revs.length === 2){
    facts.push({tag:"正逆", text:"逆位置が2枚。外側に動く前に、内側の整理を先にしたほうがよい配分です。"});
  }
  const nums = drawn.map((d,i)=>({d,i}))
    .filter(x=>x.d.card.type==="minor" && x.d.card.rank.v<=10)
    .map(x=>x.d.card.rank.v);
  if(nums.length >= 2){
    const asc = nums.every((n,i)=> i===0 || n>=nums[i-1]);
    const desc = nums.every((n,i)=> i===0 || n<=nums[i-1]);
    const list = nums.join(" → ");
    if(asc && !desc) facts.push({tag:"数字", text:`数札の数字は ${list} と上がっていて、物事が積み上がっていく途中経過が見えます。`});
    else if(desc && !asc) facts.push({tag:"数字", text:`数札の数字は ${list} と下がっていて、一度ほどいて初期に戻ってやり直す流れです。`});
    else facts.push({tag:"数字", text:`数札の数字は ${list}。行きつ戻りつしながら、調整をしている段階です。`});
  }
  const pattern = drawn.map(d=>d.orient==="up"?"u":"r").join("");
  const kws = drawn.map(d=>cardKw(d.card));
  const story = `過去の「${kws[0]}」から、現在の「${kws[1]}」へ。この先は「${kws[2]}」に向かう流れです。${FLOW_PATTERNS[pattern]}`;
  return {facts, story};
}

function shuffleDeck(){
  const idx = [...DECK.keys()];
  for(let i=idx.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]] = [idx[j],idx[i]];
  }
  return idx;
}

function buildCopyText(){
  const lines = ["宵の占い処 ─ 三枚引きタロット（78枚フルデッキ）",""];
  if(question) lines.push(`問い：${question}`,"");
  drawn.forEach((d,i)=>{
    const r = buildReading(d.card, d.orient, i);
    lines.push(`【${POSITIONS[i].jp}】${cardName(d.card)}（${d.orient==="up"?"正位置":"逆位置"}）`);
    FIELDS.forEach(f=>lines.push(`◆${f.label}`, r[f.key]));
    lines.push("");
  });
  const s = buildSynthesis(drawn);
  lines.push("【三枚の構成から】");
  s.facts.forEach(f=>lines.push(`・${f.tag}：${f.text}`));
  lines.push("", s.story);
  return lines.join("\n").trim() + "\n";
}

const TEXW = 512, TEXH = 844;
function texCanvas(){
  const c = document.createElement("canvas");
  c.width = TEXW; c.height = TEXH;
  return c;
}
function drawFrame(g){
  const grad = g.createLinearGradient(0,0,TEXW,TEXH);
  grad.addColorStop(0,"#221647"); grad.addColorStop(.55,"#170f33"); grad.addColorStop(1,"#100a26");
  g.fillStyle = grad; g.fillRect(0,0,TEXW,TEXH);
  g.strokeStyle = "#c9a35a"; g.lineWidth = 6;
  g.strokeRect(14,14,TEXW-28,TEXH-28);
  g.lineWidth = 2; g.strokeStyle = "rgba(234,208,136,.75)";
  g.strokeRect(30,30,TEXW-60,TEXH-60);
  g.fillStyle = "#ead088";
  for(const [x,y] of [[30,30],[TEXW-30,30],[30,TEXH-60+30],[TEXW-30,TEXH-30]]){
    g.beginPath(); g.arc(x,y,5,0,Math.PI*2); g.fill();
  }
}
function goldGrad(g,x0,y0,x1,y1){
  const gr = g.createLinearGradient(x0,y0,x1,y1);
  gr.addColorStop(0,"#ead088"); gr.addColorStop(.5,"#c9a35a"); gr.addColorStop(1,"#a07c3c");
  return gr;
}
/* ── スートの図像 ── */
function drawWand(g,x,y,s){
  g.save(); g.translate(x,y);
  g.strokeStyle = goldGrad(g,-s,-s,s,s); g.lineWidth = s*.22; g.lineCap = "round";
  g.beginPath(); g.moveTo(0,-s); g.lineTo(0,s); g.stroke();
  g.lineWidth = s*.1;
  g.beginPath(); g.moveTo(0,-s*.55); g.quadraticCurveTo(s*.42,-s*.75,s*.34,-s*1.05); g.stroke();
  g.beginPath(); g.moveTo(0,-s*.25); g.quadraticCurveTo(-s*.42,-s*.45,-s*.34,-s*.75); g.stroke();
  g.restore();
}
function drawCup(g,x,y,s){
  g.save(); g.translate(x,y);
  g.strokeStyle = goldGrad(g,-s,-s,s,s); g.fillStyle = "rgba(201,163,90,.16)";
  g.lineWidth = s*.13; g.lineCap = "round";
  g.beginPath(); g.moveTo(-s*.8,-s*.7); g.quadraticCurveTo(-s*.8,s*.15,0,s*.2);
  g.quadraticCurveTo(s*.8,s*.15,s*.8,-s*.7); g.stroke(); g.fill();
  g.beginPath(); g.moveTo(0,s*.2); g.lineTo(0,s*.62); g.stroke();
  g.beginPath(); g.moveTo(-s*.5,s*.8); g.quadraticCurveTo(0,s*.55,s*.5,s*.8); g.stroke();
  g.beginPath(); g.arc(0,-s*.85,s*.13,0,Math.PI*2);
  g.fillStyle = "#ead088"; g.fill();
  g.restore();
}
function drawSword(g,x,y,s){
  g.save(); g.translate(x,y);
  g.strokeStyle = goldGrad(g,-s,-s,s,s); g.lineCap = "round";
  g.lineWidth = s*.16;
  g.beginPath(); g.moveTo(0,-s); g.lineTo(0,s*.55); g.stroke();
  g.lineWidth = s*.09;
  g.beginPath(); g.moveTo(0,-s); g.lineTo(-s*.13,-s*.6); g.moveTo(0,-s); g.lineTo(s*.13,-s*.6); g.stroke();
  g.lineWidth = s*.14;
  g.beginPath(); g.moveTo(-s*.5,s*.55); g.lineTo(s*.5,s*.55); g.stroke();
  g.beginPath(); g.moveTo(0,s*.55); g.lineTo(0,s*.95); g.stroke();
  g.beginPath(); g.arc(0,s*1.02,s*.1,0,Math.PI*2); g.fillStyle="#ead088"; g.fill();
  g.restore();
}
function drawPentacle(g,x,y,s){
  g.save(); g.translate(x,y);
  g.strokeStyle = goldGrad(g,-s,-s,s,s); g.lineWidth = s*.11;
  g.beginPath(); g.arc(0,0,s*.85,0,Math.PI*2); g.stroke();
  g.beginPath();
  for(let i=0;i<5;i++){
    const a = -Math.PI/2 + i*(Math.PI*4/5);
    const px = Math.cos(a)*s*.62, py = Math.sin(a)*s*.62;
    i===0 ? g.moveTo(px,py) : g.lineTo(px,py);
  }
  g.closePath(); g.lineWidth = s*.08; g.stroke();
  g.restore();
}

  10:[[.3,.22],[.7,.22],[.3,.41],[.7,.41],[.5,.31],[.5,.51],[.3,.6],[.7,.6],[.3,.79],[.7,.79]],
};
function drawStarburst(g,cx,cy,r){
  g.save();
  g.strokeStyle = "rgba(179,160,224,.5)"; g.lineWidth = 2;
  g.beginPath(); g.arc(cx,cy,r,0,Math.PI*2); g.stroke();
  g.strokeStyle = "rgba(201,163,90,.45)";
  for(let i=0;i<16;i++){
    const a = i*Math.PI/8;
    g.beginPath();
    g.moveTo(cx+Math.cos(a)*r*1.06, cy+Math.sin(a)*r*1.06);
    g.lineTo(cx+Math.cos(a)*r*(i%2? 1.18:1.3), cy+Math.sin(a)*r*(i%2? 1.18:1.3));
    g.stroke();
  }
  g.restore();
}
function makeFrontTexture(card){
  const c = texCanvas(), g = c.getContext("2d");
  drawFrame(g);
  const artTop = 130, artBottom = TEXH-150;
  g.textAlign = "center";
  if(card.type === "major"){
    g.fillStyle = "#ead088";
    g.font = "500 52px 'Cormorant Garamond', serif";
    g.fillText(card.m.no, TEXW/2, 100);
    const cx = TEXW/2, cy = (artTop+artBottom)/2 - 10, r = 130;
    drawStarburst(g,cx,cy,r);
    g.save();
    g.shadowColor = "rgba(234,208,136,.85)"; g.shadowBlur = 46;
    g.fillStyle = goldGrad(g,cx-r,cy-r,cx+r,cy+r);
    g.font = "500 170px 'Noto Serif JP', serif";
    g.fillText(card.m.symbol, cx, cy+62);
    g.restore();
    g.fillStyle = "rgba(179,160,224,.85)";
    for(const [sx,sy] of [[.2,.22],[.8,.2],[.15,.62],[.85,.66],[.28,.78],[.72,.8]]){
      g.beginPath(); g.arc(90+sx*(TEXW-180), artTop+sy*(artBottom-artTop), 3.4, 0, Math.PI*2); g.fill();
    }
    g.fillStyle = "#ece6d8";
    g.font = "600 46px 'Noto Serif JP', serif";
    g.fillText(card.m.name, TEXW/2, TEXH-92);
    g.fillStyle = "rgba(201,163,90,.8)";
    g.font = "500 21px 'Cormorant Garamond', serif";
    g.fillText(card.m.en.toUpperCase(), TEXW/2, TEXH-56);
  }else{
    const s = SUITS[card.suit];
    g.fillStyle = "#ead088";
    g.font = "600 44px 'Noto Serif JP', serif";
    g.fillText(card.rank.disp, TEXW/2, 100);
    const v = card.rank.v;
    g.save();
    g.shadowColor = "rgba(234,208,136,.5)"; g.shadowBlur = 22;
    if(v <= 10){
      const size = v<=3 ? 62 : v<=6 ? 48 : 40;
      for(const [nx,ny] of PIPS[v]){
        SUIT_DRAW[card.suit](g, 80+nx*(TEXW-160), artTop+ny*(artBottom-artTop), size);
      }
    }else{
      const cx = TEXW/2, cy = (artTop+artBottom)/2;
      drawStarburst(g,cx,cy,124);
      SUIT_DRAW[card.suit](g,cx,cy,92);
      g.shadowBlur = 0;
      if(card.rank.v >= 13){ // クイーン・キングの冠
        g.strokeStyle = "#ead088"; g.lineWidth = 7; g.lineJoin = "round";
        g.beginPath();
        const cw = 78, ch = card.rank.v===14 ? 42 : 30, cyy = cy-158;
        g.moveTo(cx-cw/2, cyy);
        if(card.rank.v===14){
          g.lineTo(cx-cw/2, cyy-ch); g.lineTo(cx-cw/6, cyy-ch*.4);
          g.lineTo(cx, cyy-ch); g.lineTo(cx+cw/6, cyy-ch*.4);
          g.lineTo(cx+cw/2, cyy-ch); g.lineTo(cx+cw/2, cyy);
        }else{
          g.quadraticCurveTo(cx-cw/4, cyy-ch*1.6, cx, cyy-ch*.5);
          g.quadraticCurveTo(cx+cw/4, cyy-ch*1.6, cx+cw/2, cyy);
        }
        g.closePath(); g.stroke();
      }else if(card.rank.v === 12){ // ナイトの山形
        g.strokeStyle = "#ead088"; g.lineWidth = 7; g.lineCap="round";
        g.beginPath(); g.moveTo(cx-42, cy-140); g.lineTo(cx, cy-172); g.lineTo(cx+42, cy-140); g.stroke();
      }
    }
    g.restore();
    g.fillStyle = "#ece6d8";
    g.font = "600 40px 'Noto Serif JP', serif";
    g.fillText(`${s.jp}の${card.rank.jp}`, TEXW/2, TEXH-92);
    g.fillStyle = "rgba(201,163,90,.8)";
    g.font = "500 20px 'Cormorant Garamond', serif";
    g.fillText(`${s.element} / ${s.domain}`, TEXW/2, TEXH-56);
  }
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = 4;
  return t;
}
let BACK_TEX = null;
function makeBackTexture(){
  const c = texCanvas(), g = c.getContext("2d");
  const grad = g.createLinearGradient(0,0,TEXW,TEXH);
  grad.addColorStop(0,"#3a2470"); grad.addColorStop(.5,"#241a5e"); grad.addColorStop(1,"#14225c");
  g.fillStyle = grad; g.fillRect(0,0,TEXW,TEXH);
  g.strokeStyle = "#c9a35a"; g.lineWidth = 6; g.strokeRect(14,14,TEXW-28,TEXH-28);
  g.lineWidth = 2; g.strokeStyle = "rgba(234,208,136,.6)"; g.strokeRect(32,32,TEXW-64,TEXH-64);
  const cx = TEXW/2, cy = TEXH/2;
  g.save();
  g.shadowColor = "rgba(234,208,136,.8)"; g.shadowBlur = 40;
  g.fillStyle = "#ead088";
  g.beginPath(); g.arc(cx,cy,86,0,Math.PI*2); g.fill();
  g.restore();
  g.fillStyle = "#241a5e";
  g.beginPath(); g.arc(cx+34,cy-14,74,0,Math.PI*2); g.fill();
  g.fillStyle = "rgba(179,160,224,.8)";
  for(const [sx,sy,r] of [[.24,.2,4],[.76,.16,3],[.2,.8,3],[.8,.84,4],[.3,.62,2.6],[.72,.4,2.6]]){
    g.beginPath(); g.arc(sx*TEXW, sy*TEXH, r, 0, Math.PI*2); g.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.anisotropy = 4;
  return t;
}

/* ================================================================
   3Dシーン
================================================================ */
let renderer, scene, camera, raycaster, pointer;
let dealer, handL, handR, flameL, flameR, lightL, lightR;
let cards = [];             // {g:Group, flip:Group, meshes:[], picked, spot}
let phase = "ask";          // ask → shuffle → pick → reveal → done
let pickedCount = 0;
let clock = null;

const HAS_THREE = typeof THREE !== "undefined";
const HAND_REST = HAS_THREE ? [new THREE.Vector3(-1.75,.14,-2.55), new THREE.Vector3(1.75,.14,-2.55)] : null;
const SPOTS = HAS_THREE ? [
  new THREE.Vector3(-2.45, 2.05, .1),
  new THREE.Vector3(0, 2.15, 0),
  new THREE.Vector3(2.45, 2.05, .1),
] : null;
const CARD_W = .92, CARD_H = 1.5;
const FAN_N = 22;

/* ── 簡易トゥイーン ── */
const tweens = [];
function tw(dur, fn, opts={}){
  const o = {t:0, dur:Math.max(dur*DUR,.001), fn, ease:opts.ease||easeInOut, onDone:opts.onDone};
  tweens.push(o);
  return o;
}
function easeInOut(k){ return k<.5 ? 2*k*k : 1-Math.pow(-2*k+2,2)/2; }
function easeOut(k){ return 1-Math.pow(1-k,3); }
function stepTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){
    const o = tweens[i];
    o.t += dt;
    const k = Math.min(1, o.t/o.dur);
    o.fn(o.ease(k), k);
    if(k>=1){ tweens.splice(i,1); if(o.onDone) o.onDone(); }
  }
}
const later = (ms, fn) => setTimeout(fn, ms*DUR);

function alignCylinder(mesh, a, b){
  const dir = new THREE.Vector3().subVectors(b,a);
  const len = dir.length();
  mesh.scale.y = len;
  mesh.position.copy(a).addScaledVector(dir,.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
}

function initScene(){
  renderer = new THREE.WebGLRenderer({canvas:$("gl"), antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0722, .028);
  camera = new THREE.PerspectiveCamera(50, 1, .1, 60);
  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();

  /* 灯り */
  scene.add(new THREE.AmbientLight(0x2c2250, 1.15));
  const warm = new THREE.PointLight(0xffd9a0, 1.25, 20, 2);
  warm.position.set(0, 5, 0);
  scene.add(warm);
  const rim = new THREE.PointLight(0x7a5ae0, .9, 24, 2);
  rim.position.set(0, 3.2, -10);
  scene.add(rim);

  /* 円卓 */
  const feltMat = new THREE.MeshStandardMaterial({color:0x241546, roughness:.92, metalness:.05});
  const table = new THREE.Mesh(new THREE.CylinderGeometry(6.2, 6.6, 1.3, 64), feltMat);
  table.position.y = -.65;
  scene.add(table);
  const rimGold = new THREE.MeshStandardMaterial({color:0xc9a35a, roughness:.35, metalness:.7, emissive:0x3a2c10});
  const edge = new THREE.Mesh(new THREE.TorusGeometry(6.2, .05, 12, 96), rimGold);
  edge.rotation.x = Math.PI/2; edge.position.y = 0;
  scene.add(edge);
  const inner = new THREE.Mesh(new THREE.RingGeometry(4.7, 4.76, 96),
    new THREE.MeshBasicMaterial({color:0xc9a35a, transparent:true, opacity:.5, side:THREE.DoubleSide}));
  inner.rotation.x = -Math.PI/2; inner.position.y = .012;
  scene.add(inner);
  const moonMark = new THREE.Mesh(new THREE.RingGeometry(.55,.62,48,1,0,Math.PI*1.4),
    new THREE.MeshBasicMaterial({color:0xc9a35a, transparent:true, opacity:.35, side:THREE.DoubleSide}));
  moonMark.rotation.x = -Math.PI/2; moonMark.rotation.z = .5; moonMark.position.set(3.4,.012,-2.2);
  scene.add(moonMark);

  /* 蝋燭 */
  function candle(x){
    const gr = new THREE.Group();
    const body = new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,.95,16),
      new THREE.MeshStandardMaterial({color:0xd8cfc0, roughness:.7}));
    body.position.y = .48; gr.add(body);
    const flame = new THREE.Mesh(new THREE.SphereGeometry(.075,10,10),
      new THREE.MeshBasicMaterial({color:0xffdf9e}));
    flame.position.y = 1.06; flame.scale.y = 1.6; gr.add(flame);
    const l = new THREE.PointLight(0xffc46a, .8, 7, 2);
    l.position.y = 1.15; gr.add(l);
    gr.position.set(x, 0, -.6);
    scene.add(gr);
    return {flame, light:l};
  }
  ({flame:flameL, light:lightL} = candle(-4.7));
  ({flame:flameR, light:lightR} = candle(4.7));

  /* 占い師 */
  dealer = new THREE.Group();
  const robe = new THREE.MeshStandardMaterial({color:0x2a1b52, roughness:.85});
  const robeDark = new THREE.MeshStandardMaterial({color:0x1d1240, roughness:.9});
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.75, 2.8, 24), robe);
  torso.position.y = 1.4; dealer.add(torso);
  const shoulders = new THREE.Mesh(new THREE.SphereGeometry(1.12, 24, 16), robe);
  shoulders.position.y = 2.8; shoulders.scale.set(1.28,.62,1); dealer.add(shoulders);
  const hood = new THREE.Mesh(new THREE.SphereGeometry(.78, 24, 18), robeDark);
  hood.position.set(0, 3.55, -.06); hood.scale.set(1,1.12,1.05); dealer.add(hood);
  const face = new THREE.Mesh(new THREE.SphereGeometry(.5, 18, 14),
    new THREE.MeshBasicMaterial({color:0x05030f}));
  face.position.set(0, 3.5, .38); face.scale.set(.86,1,.6); dealer.add(face);
  const armMat = robe;
  const armL = new THREE.Mesh(new THREE.CylinderGeometry(.21,.24,1,12), armMat);
  const armR = new THREE.Mesh(new THREE.CylinderGeometry(.21,.24,1,12), armMat);
  dealer.add(armL); dealer.add(armR);
  const handMat = new THREE.MeshStandardMaterial({color:0xd9c2a6, roughness:.6});
  handL = new THREE.Mesh(new THREE.SphereGeometry(.2, 14, 12), handMat);
  handR = new THREE.Mesh(new THREE.SphereGeometry(.2, 14, 12), handMat);
  handL.scale.set(1.25,.5,1.6); handR.scale.set(1.25,.5,1.6);
  scene.add(handL); scene.add(handR);
  dealer.position.set(0, 0, -6.4);
  scene.add(dealer);
  dealer.userData.arms = {armL, armR};
  handL.position.copy(HAND_REST[0]);
  handR.position.copy(HAND_REST[1]);
  updateArms();

  BACK_TEX = makeBackTexture();
  onResize();
  window.addEventListener("resize", onResize);
  renderer.domElement.addEventListener("pointerdown", onTap);

  clock = new THREE.Clock();
  renderer.setAnimationLoop(loop);
}

function updateArms(){
  const {armL, armR} = dealer.userData.arms;
  const shL = new THREE.Vector3(-1.05, 2.75, -6.1);
  const shR = new THREE.Vector3(1.05, 2.75, -6.1);
  alignCylinder(armL, shL, handL.position);
  alignCylinder(armR, shR, handR.position);
}

function onResize(){
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  const aspect = w/h;
  camera.aspect = aspect;
  camera.fov = aspect < .75 ? 66 : aspect < 1.1 ? 56 : 48;
  camera.position.set(0, 4.1, aspect < .75 ? 10.8 : 9.2);
  camera.lookAt(0, .9, -2);
  camera.updateProjectionMatrix();
}

/* ── カード生成 ── */
function buildCards(){
  for(const c of cards){
    scene.remove(c.g);
    c.meshes.forEach(m=>{ if(m.material.map && m.material.map !== BACK_TEX) m.material.map.dispose(); m.material.dispose(); });
  }
  cards = [];
  const geo = new THREE.PlaneGeometry(CARD_W, CARD_H);
  for(let i=0;i<FAN_N;i++){
    const g = new THREE.Group();
    const flip = new THREE.Group();
    const backMat = new THREE.MeshBasicMaterial({map:BACK_TEX});
    const frontMat = new THREE.MeshBasicMaterial({color:0x170f33});
    const front = new THREE.Mesh(geo, frontMat);
    const back = new THREE.Mesh(geo, backMat);
    back.rotation.y = Math.PI;
    flip.add(front); flip.add(back);
    g.add(flip);
    // 積まれた山（中央やや奥）
    g.position.set((Math.random()-.5)*.5, .03+i*.012, -1.1+(Math.random()-.5)*.5);
    g.rotation.set(Math.PI/2, 0, (Math.random()-.5)*.8);
    scene.add(g);
    cards.push({g, flip, meshes:[front, back], front, picked:false});
  }
}

/* ── シャッフル ── */
function shufflePhase(){
  phase = "shuffle";
  say("占い師がカードを混ぜています…");
  const T = 3.4;
  // 手が山の上へ
  const startL = handL.position.clone(), startR = handR.position.clone();
  tw(.8, k=>{
    handL.position.lerpVectors(startL, new THREE.Vector3(-.9,.85,-1.1), k);
    handR.position.lerpVectors(startR, new THREE.Vector3(.9,.85,-1.1), k);
  });
  // 手が円を描く
  tw(T, (k)=>{
    const a = k*Math.PI*4;
    handL.position.set(Math.cos(a)*.95-.15, .8+Math.sin(a*2)*.09, -1.1+Math.sin(a)*.75);
    handR.position.set(Math.cos(a+Math.PI)*.95+.15, .8+Math.cos(a*2)*.09, -1.1+Math.sin(a+Math.PI)*.75);
  }, {ease:k=>k, onDone:()=>{
    const bL = handL.position.clone(), bR = handR.position.clone();
    tw(.8, k=>{
      handL.position.lerpVectors(bL, HAND_REST[0], k);
      handR.position.lerpVectors(bR, HAND_REST[1], k);
    });
    spreadPhase();
  }});
  // カードがかき混ぜられる
  cards.forEach((c)=>{
    const n = 3;
    for(let j=0;j<n;j++){
      later((j*(T/n)*1000)+Math.random()*220, ()=>{
        const from = c.g.position.clone(), fromR = c.g.rotation.z;
        const to = new THREE.Vector3((Math.random()-.5)*2.6, .03+Math.random()*.24, -1.1+(Math.random()-.5)*1.7);
        const toR = fromR + (Math.random()-.5)*2.4;
        tw(.5, k=>{
          c.g.position.lerpVectors(from, to, k);
          c.g.position.y = from.y+(to.y-from.y)*k + Math.sin(k*Math.PI)*.16;
          c.g.rotation.z = fromR+(toR-fromR)*k;
        });
      });
    }
  });
}

/* ── 扇に広げる ── */
function spreadPhase(){
  later(300, ()=>{
    say(`導かれるままに、カードをお選びください（あと3枚）`);
    const half = (FAN_N-1)/2;
    cards.forEach((c,i)=>{
      const a = (i-half)*.088;                       // 扇の角度
      const R = 3.2;
      const cx = Math.sin(a)*R*1.35;
      const cz = 2.85 - (1-Math.cos(a))*2.3;         // 中央が手前に膨らむ弧
      const from = c.g.position.clone(), fromRZ = c.g.rotation.z;
      const toRZ = -a;
      later(i*45, ()=>{
        tw(.75, k=>{
          c.g.position.lerpVectors(from, new THREE.Vector3(cx, .02+i*.006, cz), k);
          c.g.position.y = from.y + (.02+i*.006-from.y)*k + Math.sin(k*Math.PI)*.28;
          c.g.rotation.z = fromRZ + (toRZ-fromRZ)*k;
        }, {onDone: i===FAN_N-1 ? ()=>{ phase = "pick"; } : null});
      });
    });
  });
}

/* ── タップでカードを選ぶ ── */
function onTap(e){
  if(phase !== "pick" || pickedCount >= 3) return;
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX-rect.left)/rect.width)*2-1;
  pointer.y = -((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(cards.filter(c=>!c.picked).map(c=>c.meshes).flat());
  if(!hits.length) return;
  let obj = hits[0].object;
  const c = cards.find(cc=>cc.meshes.includes(obj));
  if(!c || c.picked) return;
  pickCard(c);
}

function pickCard(c){
  c.picked = true;
  const spotIdx = pickedCount++;
  const dCard = DECK[shuffled[spotIdx]];
  const orient = Math.random() < .5 ? "up" : "rev";
  drawn.push({card:dCard, orient});
  c.front.material.map = makeFrontTexture(dCard);
  c.front.material.color.set(0xffffff);
  c.front.material.needsUpdate = true;
  c.spot = spotIdx;

  const from = c.g.position.clone();
  const fromRX = c.g.rotation.x, fromRZ = c.g.rotation.z;
  const to = SPOTS[spotIdx];
  // 浮き上がってから立ち上がる（裏面を見せたまま）
  tw(.45, k=>{
    c.g.position.set(from.x, from.y + k*.5, from.z);
  }, {ease:easeOut, onDone:()=>{
    const mid = c.g.position.clone();
    tw(1.0, k=>{
      c.g.position.lerpVectors(mid, to, k);
      c.g.rotation.x = fromRX + (Math.PI - fromRX)*k;   // π/2 → π：裏面が正面を向いたまま起立
      c.g.rotation.z = fromRZ * (1-k);
      const sc = 1 + k*.5;
      c.g.scale.set(sc, sc, sc);
    }, {onDone:()=>{
      if(pickedCount < 3){
        say(`導かれるままに、カードをお選びください（あと${3-pickedCount}枚）`);
      }else{
        say("カードが開かれます…", 4000);
        later(900, revealPhase);
      }
    }});
  }});
}

/* ── 開示 ── */
function revealPhase(){
  phase = "reveal";
  drawn.forEach((d, i)=>{
    const c = cards.find(cc=>cc.spot === i);
    // 正位置は z=π で補正（グループが x=π のため）。逆位置は z=0 のままで上下逆に映る
    later(i*820, ()=>{
      if(d.orient === "up") c.flip.rotation.z = Math.PI;
      tw(.85, k=>{
        c.flip.rotation.y = Math.PI * k;               // 裏 → 表
      }, {onDone:()=>{
        const lbl = $("lbl"+i);
        lbl.querySelector(".n").textContent = cardName(d.card);
        lbl.querySelector(".o").textContent = d.orient==="up" ? "正位置" : "逆位置";
        lbl.classList.add("show");
        if(i === 2){
          phase = "done";
          later(1400, openSheet);
        }
      }});
    });
  });
}

/* ── ラベル位置の追従 ── */
const _v = HAS_THREE ? new THREE.Vector3() : null;
function placeLabels(){
  for(let i=0;i<3;i++){
    const lbl = $("lbl"+i);
    if(!lbl.classList.contains("show")) continue;
    _v.copy(SPOTS[i]); _v.y -= CARD_H*.78*1.5;
    _v.project(camera);
    lbl.style.left = ((_v.x*.5+.5)*window.innerWidth)+"px";
    lbl.style.top  = ((-_v.y*.5+.5)*window.innerHeight)+"px";
  }
}

/* ── ループ ── */
let elapsed = 0;
function loop(){
  const dt = Math.min(clock.getDelta(), .05);
  elapsed += dt;
  stepTweens(dt);
  // 蝋燭の揺らぎ
  const f = Math.sin(elapsed*9)*.5 + Math.sin(elapsed*23.7)*.5;
  flameL.scale.setScalar(1 + f*.12); flameL.scale.y = 1.6+f*.2;
  flameR.scale.setScalar(1 - f*.1);  flameR.scale.y = 1.6-f*.16;
  lightL.intensity = .8 + f*.12;
  lightR.intensity = .8 - f*.1;
  // 占い師の呼吸
  dealer.position.y = Math.sin(elapsed*.9)*.045;
  dealer.rotation.y = Math.sin(elapsed*.35)*.03;
  // 手（待機中の微動）
  if(phase!=="shuffle"){
    handL.position.y = HAND_REST[0].y + Math.sin(elapsed*1.1)*.02;
    handR.position.y = HAND_REST[1].y + Math.sin(elapsed*1.1+1.4)*.02;
  }
  updateArms();
  // カメラのごく僅かな揺れ
  camera.position.x = Math.sin(elapsed*.32)*.14;
  placeLabels();
  renderer.render(scene, camera);
}

/* ================================================================
   進行
================================================================ */
function startRound(){
  drawn = []; pickedCount = 0;
  shuffled = shuffleDeck();
  for(let i=0;i<3;i++) $("lbl"+i).classList.remove("show");
  buildCards();
  later(500, shufflePhase);
}

function begin(){
  question = $("q").value.trim();
  $("ask").classList.add("hide");
  later(500, startRound);
}
$("askBtn").addEventListener("click", begin);
$("q").addEventListener("keydown", e=>{ if(e.key === "Enter") begin(); });

$("againBtn").addEventListener("click", ()=>{
  $("sheet").classList.remove("show");
  $("reopen").classList.remove("show");
  for(let i=0;i<3;i++) $("lbl"+i).classList.remove("show");
  later(700, ()=>{
    $("ask").classList.remove("hide");
    phase = "ask";
  });
});

/* 起動 */
(function boot(){
  if(!HAS_THREE || typeof WebGLRenderingContext === "undefined"){
    $("nogl").style.display = "flex";
    return;
  }
  try{
    initScene();
  }catch(err){
    console.error(err);
    $("nogl").style.display = "flex";
  }
})();
</script>
